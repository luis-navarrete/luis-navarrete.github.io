<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Postre Mío</title>

<style>

html, body {
  height: 100%;
  overflow: hidden; /* 🚫 NO scroll global */
}

body {
  touch-action: manipulation;
}

.page {
  height: calc(100dvh - 100px); /* resta el header */
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.menu-btn {
  position: absolute;
  left: 10px;
  top: 15px;

  font-size: 24px;
  background: none;
  border: none;

  color: white;
  z-index: 10000;
}

.side-menu {
  position: fixed;
  top: 0;
  left: -250px; /* oculto */
  width: 250px;
  height: 100%;

  background: white;
  box-shadow: 2px 0 10px rgba(0,0,0,0.2);

  transition: left 0.3s ease;
  z-index: 3000;
}

.side-menu.open {
  left: 0;
}

.menu-content {
  padding: 20px;
}

.menu-content button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;

  border: none;
  background: #f5f5f5;
  border-radius: 8px;
}

.header {
  position: sticky;
  top: 0;
  z-index: 1000;

  width: 100%;
  background: #7ED0D2;
  backdrop-filter: blur(10px);
  padding: 10px;
  text-align: center;
}

.header img {
  max-height: 80px;
  object-fit: contain;
}

body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

.container {
  display: flex;
  height: 100%;
}

/* PRODUCTOS */
.products {
  width: 60%;
  padding: 10px;
  overflow-y: auto;
}

.category {
  margin-bottom: 15px;
}

.category h2 {
  margin: 10px 5px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.product {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
}

.product img {
  width: 100%;
  border-radius: 10px;
  height: 120px;
  object-fit: cover;
}

.stock {
  font-size: 10px;
  color: #888;
}

/* CANASTA */
.cart {
  width: 32%;
  background: #fff;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.cart-items {
  flex: 1;
  overflow-y: auto;
  flex: none;
  max-height: 300px;
}

.item {
  display: block;
  justify-content: space-between;
  margin-bottom: 10px;
  padding: 12px 0;
  border-bottom: 1px solid #eee;
}

.item:last-child {
  border-bottom: none;
}

.cart-item-name {
  font-weight: 600;
}

.cart-item-price {
  font-size: 14px;
  color: #555;
  margin-bottom: 5px;
}

.cart-item-controls {
  display: flex;
  gap: 10px;
}

.cart-item-controls button {
  flex: 1;
  padding: 8px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #f5f5f5;
}

.cart-item-controls button:active {
  background: #ddd;
}

.total {
  font-size: 20px;
  font-weight: bold;
}

button {
  padding: 15px;
  margin-top: 10px;
  border: none;
  font-size: 16px;
  border-radius: 10px;
}

.pay {
  background: black;
  color: white;
}

.pay:disabled {
  background: #999;
  opacity: 0.8;
}

.clear {
  background: #ddd;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
}

.modal-content button {
  width: 100%;
  margin-top: 10px;
}

#inventoryList {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
}

.inventory-card {
  background: white;
  border-radius: 12px;
  padding: 12px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  display: flex;
  flex-direction: column;
  gap: 5px;
}

.inv-name {
  font-weight: 600;
}

.inv-qty {
  font-size: 14px;
  color: #555;
}

.inv-controls {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.inv-controls button {
  flex: 1;
  margin: 0 3px;
  padding: 8px;

  border: none;
  border-radius: 8px;
  background: #f5f5f5;
}

.inventory-card.updated {
  border: 2px solid #4caf50;
  background: #e8f5e9;
}

#historyList {
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#historyList button {
  margin-top: 10px;
  background: #ffebee;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.delete-btn {
  background: transparent;
  border: none;
  font-size: 16px;
  cursor: pointer;
  opacity: 0.6;
  margin-left: auto;
}

.delete-btn:hover {
  opacity: 1;
}

.page-content {
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  padding: 20px;
  padding-bottom: 120px;

  box-sizing: border-box;
}

.history-row {
  display: grid;
  grid-template-columns: 1fr 80px 80px;
  gap: 10px;
  font-size: 14px;
  align-items: center;
}

.history-items {
  margin: 5px 0;
}

.history-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.history-total {
  font-weight: bold;
}

.delete-btn {
  margin-left: auto;
}

.history-header-row {
  display: grid;
  grid-template-columns: 1fr 80px 80px;
  gap: 10px;
  font-size: 12px;
  font-weight: bold;
  opacity: 0.7;
  margin-bottom: 5px;
}

.history-row span:nth-child(2),
.history-row span:nth-child(3),
.history-header-row span:nth-child(2),
.history-header-row span:nth-child(3) {
  text-align: right;
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: black;
  color: white;
  padding: 12px 18px;
  border-radius: 8px;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

</style>
</head>

<body>

<div class="header">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <img src="logo.jpeg">
</div>


<!-- 🟢 PÁGINA PRINCIPAL -->
<div id="posPage" class="page" style="display:block;">

  <div class="container">

    <div class="products" id="products"></div>

    <div class="cart">
      <h2>🛒 Orden</h2>
      <div class="cart-items" id="cart"></div>
      <div class="total">Total: $<span id="total">0</span></div>

      <button id="payBtn" class="pay" onclick="openPaymentOptions();">Cobrar</button>
      <button class="clear" onclick="clearCart()">Limpiar</button>
    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- INVENTARIO -->
<div id="inventoryPage" class="page" style="display:none;">
  <div class="page-content">
    <h2>Inventario</h2>
    <div id="inventoryList"></div>
  </div>
</div>

<!-- HISTORIAL -->
<div id="historyPage" class="page" style="display:none;">
  <div class="page-content">
    <h2>Historial</h2>
    <div id="historyList"></div>
    <div style="text-align: center;">
      <button id="cutBtn" onclick="generateCut() ">Corte</button>
    </div>
  </div>
</div>

<!-- MENÚ -->
<div id="sideMenu" class="side-menu">
  <div class="menu-content">
    <h3>Menú</h3>
    <button onclick="showPage('pos')">Caja</button>
    <button onclick="showPage('inventory')">Inventario</button>
    <button onclick="showPage('history')">Historial</button>
  </div>
</div>

<div id="ticket-container" style="position: fixed; left: -9999px; top: 0;"></div>



<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

let inventory = JSON.parse(localStorage.getItem("inventory")) || {
  "M&Ms": 10,
  "Lotus": 10,
  "Kinder Bueno": 10,
  "Red Velvet": 10,
  "Oreo": 10,
  "Lucky Charms": 10,
  "Conejito Turín": 10,
  "Crookie": 10,
  "Rol de canela": 10,
  "Brownie": 10,
  "Carlota de limón": 10
};

let originalInventory = JSON.parse(JSON.stringify(inventory));
let updatedItems = new Set();

function saveInventory() {
  localStorage.setItem("inventory", JSON.stringify(inventory));
}

function saveHistory() {
  localStorage.setItem("history", JSON.stringify(history));
}

let currentSale = null;

const menu = [
  {
    category: "🍪 Galletas",
    items: [
      { name: "M&Ms", price: 45.00, img: "mms.jpg" },
      { name: "Lotus", price: 40.00, img: "lotus.jpg" },
      { name: "Kinder Bueno", price: 40.00, img: "kinder.jpg" },
      { name: "Red Velvet", price: 40.00, img: "redvelvet.jpg" },
      { name: "Oreo", price: 40.00, img: "oreo.jpg" },
      { name: "Lucky Charms", price: 40.00, img: "lucky.jpg" },
      { name: "Conejito Turín", price: 45.00, img: "turin.jpg" }
    ]
  },
  {
    category: "✨ Especiales",
    items: [
      { name: "Crookie", price: 60.00, img: "crookie.jpg" },
      { name: "Rol de canela", price: 60.00, img: "rol.jpg" },
      { name: "Brownie", price: 35.00, img: "brownie.jpg" }
    ]
  },
  {
    category: "🍰 Postres",
    items: [
      { name: "Carlota de limón", price: 30.00, img: "carlota.jpg" }
    ]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Render productos
function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  menu.forEach(cat => {
    const section = document.createElement("div");
    section.className = "category";

    section.innerHTML = `<h2>${cat.category}</h2>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    cat.items.forEach(item => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <img src="${item.img}">
        <h3>${item.name}</h3>
        <p>$${item.price}</p>
        <div>Stock: ${inventory[item.name]}</div>
      `;
      div.onclick = () => addToCart(item);
      grid.appendChild(div);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

// Carrito
function addToCart(item) {
  if (inventory[item.name] > 0) {
    cart.push(item);
  } else {
    alert("Sin stock");
  }
  renderCart();
}

function renderCart() {
  const payBtn = document.getElementById("payBtn");
  payBtn.disabled = cart.length === 0;
  
  const container = document.getElementById("cart");
  container.innerHTML = "";
  let total = 0;

  const grouped = {};

  cart.forEach(item => {
    if (!grouped[item.name]) {
      grouped[item.name] = { ...item, qty: 0 };
    }
    grouped[item.name].qty++;
  });

  Object.values(grouped).forEach(item => {
    total += item.price * item.qty;

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="cart-item-name">
        ${item.name}
      </div>

      <div class="cart-item-price">
        $${item.price} × ${item.qty}
      </div>

      <div class="cart-item-controls">
        <button onclick="changeQty('${item.name}', -1)">−</button>
        <button onclick="changeQty('${item.name}', 1)">+</button>
      </div>
    `;
    container.appendChild(div);
  });

  document.getElementById("total").innerText = total;
  localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(name, delta) {
  const currentQty = cart.filter(i => i.name === name).length;

  if (delta > 0) {
    if (currentQty < inventory[name]) {
      const item = menu.flatMap(c => c.items).find(i => i.name === name);
      cart.push(item);
    } else {
      alert("No hay más stock disponible");
    }
  } else {
    const index = cart.findIndex(i => i.name === name);
    if (index > -1) cart.splice(index, 1);
  }

  renderCart();
}

function removeItem(i) {
  cart.splice(i, 1);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

function openModal(html) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  content.innerHTML = html;
  modal.classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

function openPaymentOptions() {
  const total = parseFloat(document.getElementById("total").innerText);

  openModal(`
    <h3>Cobrar: $${total}</h3>

    <button onclick="handleCash(${total})">Efectivo</button>
    <button onclick="handleTransfer(${total})">Transferencia</button>
    <button onclick="closeModal()">Cancelar</button>
  `);
}

function handleCash(total) {
  openModal(`
    <h3>Total: $${total}</h3>

    <input 
      id="cashInput"
      type="number"
      inputmode="numeric"
      placeholder="Pago con..."
      style="width:94%; padding:10px; font-size:18px;"
    />

    <button id="continueBtn" disabled>Continuar</button>
    <button onclick="openPaymentOptions(${total})">Regresar</button>
  `);

  const input = document.getElementById("cashInput");
  const btn = document.getElementById("continueBtn");

  // 👉 abre teclado automáticamente
  setTimeout(() => input.focus(), 100);

  input.addEventListener("input", () => {
    const value = parseFloat(input.value);
    btn.disabled = !(value >= total);
  });

  btn.onclick = () => {
    const value = parseFloat(input.value);
    const change = value - total;
    showFinalStep(total, "cash", change);
  };
}

function handleTransfer(total) {
  showFinalStep(total, "transfer", 0);
}

function showFinalStep(total, method, change) {

  const amount = method === "cash"
    ? parseFloat(document.getElementById("cashInput")?.value || total)
    : total;

  // 👉 guardar venta temporal
  currentSale = {
    date: new Date().toLocaleString(),
    items: [...cart],
    total: total,
    method: method,
    amount: amount,
    change: change
  };

  openModal(`
    <h3>Total: $${total}</h3>

    ${method === "cash" ? `<p>Cambio: $${change}</p>` : ""}

    <button onclick="finalizeSale()">
      Finalizar
    </button>
    <button onclick="openPaymentOptions(${total})">Regresar</button>
  `);
}

function saveSale(total) {
  const date = new Date().toLocaleString();

  const sale = {
    id: Date.now(),
    date: date,
    items: [...cart],
    total: total
  };

  const history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(sale);
  localStorage.setItem("history", JSON.stringify(history));

  cart.forEach(item => {
    if (inventory[item.name] > 0) {
      inventory[item.name]--;
    }
  });
}

function finalizeSale() {
  if (!currentSale) {
    alert("Error en la venta");
    return;
  }

  // guardar en history
  const history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(currentSale);
  localStorage.setItem("history", JSON.stringify(history));

  // descontar inventario
  currentSale.items.forEach(item => {
    if (inventory[item.name] > 0) {
      inventory[item.name]--;
    }
  });

  saveInventory();

  closeModal();
  showToast("Venta registrada ✅");

  renderProducts();
  clearCart();
  renderHistory();

  if (confirm("¿Generar ticket?")) {
    generateTicket(currentSale); // 🔥 PASAMOS LA VENTA REAL
  }

  currentSale = null;
}

function generateTicket(sale) {
  if (!sale) {
    alert("No hay venta disponible");
    return;
  }

  const container = document.getElementById("ticket-container");

  if (!container) {
    alert("No existe #ticket-container en el HTML");
    return;
  }

  let rows = "";
  const grouped = {};

  sale.items.forEach(item => {
    if (!grouped[item.name]) {
      grouped[item.name] = {
        qty: 0,
        price: item.price
      };
    }
    grouped[item.name].qty++;
  });

  Object.entries(grouped).forEach(([name, info]) => {
    const totalItem = info.qty * info.price;

    rows += `
      <tr>
        <td>${info.qty} × ${name}</td>
        <td>$ ${info.price}</td>
        <td style="text-align: right;">$ ${totalItem}</td>
      </tr>
    `;

function toggleMenu() {
  const menu = document.getElementById("sideMenu");
  menu.classList.toggle("open");
}

document.addEventListener("click", function(e) {
  const menu = document.getElementById("sideMenu");
  const btn = document.querySelector(".menu-btn");

  if (!menu || !btn) return;

  if (!menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove("open");
  }
});

function showPage(page) {
  document.getElementById("posPage").style.display = "none";
  document.getElementById("inventoryPage").style.display = "none";
  document.getElementById("historyPage").style.display = "none";

  if (page === "pos") {
    document.getElementById("posPage").style.display = "block";
  }

  if (page === "inventory") {
    document.getElementById("inventoryPage").style.display = "block";

    originalInventory = JSON.parse(JSON.stringify(inventory));
    updatedItems.clear();

    renderProducts();
    renderInventory();
  }

  if (page === "history") {
    document.getElementById("historyPage").style.display = "block";
    renderHistory();
  }

  if (page !== "inventory") {
    updatedItems.clear();
  }

  toggleMenu(); // cerrar menú al seleccionar
}

function renderInventory() {
  const container = document.getElementById("inventoryList");
  container.innerHTML = "";

  Object.keys(inventory).forEach(name => {
    const qty = inventory[name];

    const div = document.createElement("div");
    div.className = "inventory-card " + (updatedItems.has(name) ? "updated" : "");

    div.innerHTML = `
      <div class="inv-name">${name}</div>
      <div class="inv-qty">Stock: ${qty}</div>

      <div class="inv-controls">
        <button onclick="updateStock('${name}', -1)">−</button>
        <button onclick="updateStock('${name}', 1)">+</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function updateStock(name, delta) {
  inventory[name] += delta;

  if (inventory[name] < 0) inventory[name] = 0;

  if (inventory[name] !== originalInventory[name]) {
    updatedItems.add(name);
  } else {
    updatedItems.delete(name);
  }

  saveInventory();
  renderInventory();
  
  renderProducts();
}

function renderHistory() {
  const container = document.getElementById("historyList");
  if (!container) return;

  container.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("history")) || [];

  if (data.length === 0) {
    container.innerHTML = "<p>No hay ventas aún.</p>";
    return;
  }

  data.slice().reverse().forEach((sale) => {
    const realIndex = data.indexOf(sale);
    const div = document.createElement("div");
    div.className = "inventory-card";

    // 🔥 Agrupar productos
    const grouped = {};

    (sale.items || []).forEach(i => {
      const name = i.name;
      const price = i.price;

      if (!grouped[name]) {
        grouped[name] = { qty: 0, price: price };
      }

      grouped[name].qty++;
    });

    // 🔥 Construir filas bonitas
    let itemsHTML = "";
    let total = 0;

    Object.entries(grouped).forEach(([name, info]) => {
      const subtotal = info.qty * info.price;
      total += subtotal;

      itemsHTML += `
        <div class="history-row">
          <span>${info.qty} × ${name}</span>
          <span>$${info.price}</span>
          <span>$${subtotal}</span>
        </div>
      `;
    });

    div.innerHTML = `
      <div class="inv-name">${sale.date || ""}</div>

      <div class="history-items">
        <div class="history-header-row">
          <span>Descripción</span>
          <span>Precio</span>
          <span>Total</span>
        </div>

        ${itemsHTML}
      </div>

      <div class="history-footer">
        <div class="history-total">Total: $${total}</div>
        <button class="delete-btn" onclick="deleteSale(${realIndex})">🗑️</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function deleteSale(index) {
  const data = JSON.parse(localStorage.getItem("history")) || [];

  if (!confirm("¿Borrar esta transacción?")) return;

  const sale = data[index];

  // 🟢 DEVOLVER INVENTARIO
  (sale.items || []).forEach(item => {
    if (!inventory[item.name]) {
      inventory[item.name] = 0;
    }
    inventory[item.name]++;
  });

  saveInventory();

  // eliminar venta
  data.splice(index, 1);
  localStorage.setItem("history", JSON.stringify(data));

  renderProducts();
  renderInventory();
  renderHistory();
}

function generateCut() {
  const today = new Date().toLocaleDateString().split("T")[0];

  const history = JSON.parse(localStorage.getItem("history")) || [];

  const todaySales = history.filter(s => s.date.startsWith(today));

  const total = todaySales.reduce((sum, s) => sum + s.total, 0);
  const count = todaySales.length;

  let breakdown = {};

  todaySales.forEach(sale => {
    sale.items.forEach(item => {
      breakdown[item] = (breakdown[item] || 0) + 1;
    });
  });

  console.log("Corte:", { total, count, breakdown });

  exportToExcel();

  clearSales();
}

function clearSales() {
  if (confirm("¿Cerrar caja y borrar ventas?")) {
    history = [];
    localStorage.removeItem("history");

    alert(
      "Corte del día\n\n" +
      "ventas: " + count + "\n" +
      "Total: $" + total
    );

    renderHistory();
  }
}

function exportToExcel() {
  const history = JSON.parse(localStorage.getItem("history")) || [];

  let products = new Set();

  history.forEach(sale => {
    sale.items.forEach(item => {
      products.add(item.name);
    });
  });

  products = Array.from(products);

  let csv = "Fecha,Hora,";

  products.forEach(p => {
    csv += p + ",";
  });

  csv += "Total\n";

  history.forEach(sale => {

    const saleDate = sale.date.split(",")[0]
    const saleTime = sale.date.split(",")[1]

    let row = `${saleDate},${saleTime},`;

    products.forEach(p => {
      
      let cantidad = 0;

      sale.items.forEach(item => {
        if ((item.name || item) === p) {
          cantidad++;
        }
      });

      row += cantidad + ",";
    })

    row += sale.total + "\n";

    csv += row;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = `postre_mio_corte_${new Date().toLocaleDateString()}.csv`
  link.click();

  URL.revokeObjectURL(url);
}

  setTimeout(() => {

  setTimeout(() => {

  }, 2500);
}
